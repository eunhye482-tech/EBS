<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Master - Hard Skills vs Soft Skills</title>
    <style>
        :root { 
            --yellow-light: #FFFDE7; --yellow-pale: #FFF9C4; --yellow-main: #FBC02D; 
            --yellow-dark: #F57F17; --pink-soft: #FFF5F7; --text-dark: #5D4037;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #FFFEF0; display: flex; justify-content: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 12px; text-align: center; font-weight: bold; color: var(--yellow-dark); border-bottom: 1px solid var(--yellow-pale); background: white; font-size: 0.95rem; position: sticky; top: 0; z-index: 10; }
        #display-area { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .nav-btns-fixed { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; margin-top: auto; position: sticky; bottom: 0; align-items: stretch; height: 80px; box-sizing: border-box; }
        .btn-prev { background: #F5F5F5; color: #718096; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 30%; margin-right: 10px; display: flex; align-items: center; justify-content: center; }
        .btn-next { background: var(--yellow-main); color: var(--text-dark); border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; }
        .main-title-card { width: auto; background: var(--yellow-main); padding: 25px 15px; border-radius: 20px; color: var(--text-dark); margin-bottom: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box; }
        .main-title-card h1 { margin: 0; font-size: 1.4rem; font-weight: 900; line-height: 1.3; }
        .structure-container { background: var(--yellow-light); border: 2px solid var(--yellow-pale); border-radius: 20px; padding: 20px; margin-bottom: 20px; color: var(--text-dark); }
        .struct-item { margin-bottom: 18px; border-bottom: 1px dashed var(--yellow-pale); padding-bottom: 10px; }
        .struct-item:last-child { border: none; }
        .struct-label { font-weight: 900; color: #E65100; font-size: 0.95rem; display: block; margin-bottom: 6px; }
        .struct-text { font-size: 0.9rem; line-height: 1.6; font-weight: 500; text-align: justify; }
        .topic-area { background: var(--pink-soft); border: 2px solid #F8BBD0; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .topic-title { font-weight: bold; color: #D81B60; font-size: 0.85rem; display: block; margin-bottom: 10px; }
        .topic-kor { font-weight: bold; color: #333; font-size: 1rem; display: block; line-height: 1.5; margin-bottom: 8px; }
        .topic-eng { font-size: 0.85rem; color: #666; font-style: italic; display: block; line-height: 1.4; }
        .sentence-box { background: var(--yellow-light); padding: 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin-bottom: 15px; border: 2px solid var(--yellow-pale); text-align: center; cursor: pointer; line-height: 1.5; }
        .kor-box { background: #FFF5F7; padding: 20px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; color: #D81B60; margin-bottom: 15px; border: 2px solid #F8BBD0; text-align: center; line-height: 1.6; }
        .voca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .voca-item { background: #fff; padding: 10px; border-radius: 10px; font-size: 0.82rem; border: 1px solid var(--yellow-pale); cursor: pointer; text-align: center; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .voca-item.revealed { background: var(--yellow-main); color: var(--text-dark); }
        .blank-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; padding: 10px; background: #fdfdfd; border-radius: 15px; }
        .word-blank { border-bottom: 2px solid var(--yellow-main); min-width: 35px; text-align: center; font-size: 1rem; color: transparent; cursor: pointer; padding: 0 2px; }
        .word-blank.revealed { color: var(--text-dark); border-bottom-color: transparent; font-weight: bold; }
        .btn-check { background: #f0f0f0; padding: 12px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .trans-content { display: none; padding: 15px; background: #fafafa; border-radius: 15px; border-left: 5px solid var(--yellow-main); font-size: 0.9rem; margin-bottom: 10px; }
        .btn-start-next { background: var(--yellow-main); color: var(--text-dark); padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="header" id="header-title">English Master - EBS 8-6</div>
    <div id="display-area"></div>
    <div id="nav-area" class="nav-btns-fixed hidden">
        <button class="btn-prev" onclick="handlePrev()">PREV</button>
        <button class="btn-next" onclick="handleNext()" id="main-next-btn">NEXT</button>
    </div>
</div>
<script>
    const fullData = [
        { en: "Hard skills are defined as the specific procedural skills and technical expertise that are required to perform a job, or more aptly put, the ‘what’ needs to be done.", ko: "하드 스킬은 직무를 수행하는 데 요구되는 구체적인 절차적 기술과 전문 기술 지식, 즉 더 적절히 표현하자면 ‘무엇’이 행해져야 하는가로 정의된다.", voca: ["define:정의하다", "specific:구체적인", "procedural:절차적인", "technical:기술적인", "expertise:전문 지식", "require:요구하다", "perform:수행하다", "aptly:적절히", "🍎", "🍎"] },
        { en: "These skills are clearly listed in the job description and are acquired through more highly specific education and training programs.", ko: "이러한 기술들은 직무 기술서에 명확히 기재되어 있으며, 보다 고도로 구체적인 교육 및 훈련 프로그램을 통해 습득된다.", voca: ["clearly:명확히", "list:기재하다/나열하다", "job description:직무 기술서", "acquire:습득하다", "highly:고도로", "education:교육", "training:훈련", "🍎", "🍎", "🍎"] },
        { en: "Hard skills are the skills we think of when considering a professional college degree.", ko: "하드 스킬은 전문적인 대학 학위를 고려할 때 우리가 떠올리는 기술이다.", voca: ["think of:떠올리다/생각하다", "consider:고려하다", "professional:전문적인", "college degree:대학 학위", "🍎", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "Examples include accountants, who must have accounting degrees, lawyers, who must have law degrees, and doctors, who must have medical degrees.", ko: "예를 들어 회계학 학위가 있어야 하는 회계사, 법학 학위가 있어야 하는 변호사, 의학 학위가 있어야 하는 의사가 이에 포함된다.", voca: ["example:예시", "include:포함하다", "accountant:회계사", "accounting:회계학", "lawyer:변호사", "law:법학", "doctor:의사", "medical:의학의", "🍎", "🍎"] },
        { en: "But does that mean that these professionals do not need soft skills? We think not.", ko: "하지만 그것이 이 전문가들에게 소프트 스킬이 필요하지 않다는 것을 의미할까? 우리는 그렇지 않다고 생각한다.", voca: ["mean:의미하다", "professional:전문가", "soft skill:소프트 스킬", "think not:그렇지 않다고 생각하다", "🍎", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "In fact, these soft attributes, or ‘how’ something is done, are equally critical and allow professionals to thrive in the interpersonal service orientated economy faced daily.", ko: "사실, 무언가가 ‘어떻게’ 행해지는가에 해당하는 이러한 소프트 적 특성들은 똑같이 중요하며, 전문가들이 매일 마주하는 대인 서비스 중심의 경제에서 번창할 수 있도록 해 준다.", voca: ["in fact:사실", "attribute:특성/속성", "equally:똑같이/동등하게", "critical:중요한/치명적인", "allow:하게 하다", "thrive:번창하다/성공하다", "interpersonal:대인 관계의", "service-orientated:서비스 중심의", "economy:경제", "faced:마주하는"] },
        { en: "This is why modern businesses are looking for graduates with a good mix of hard and soft skills as they enter the workforce.", ko: "이것이 바로 현대 기업들이 취업 전선에 진입하는 대학교 졸업생들에게 하드 스킬과 소프트 스킬의 우수한 조화를 기대하고 찾는 이유이다.", voca: ["modern:현대의", "business:기업/회사", "look for:찾다", "graduate:졸업생", "good mix:우수한 조화", "enter:진입하다/들어가다", "workforce:노동인구/취업전선", "🍎", "🍎", "🍎"] }
    ];

    let currentMode = 'INTRO'; let currentIdx = 0; const synth = window.speechSynthesis;

    function render() {
        const area = document.getElementById('display-area'); const nav = document.getElementById('nav-area'); const header = document.getElementById('header-title'); area.innerHTML = '';
        if (currentMode === 'INTRO') {
            header.innerText = "Step 1. Overview"; nav.classList.add('hidden');
            area.innerHTML = `<div class="main-title-card"><h1>Hard Skills vs Soft Skills</h1></div>
                <div class="structure-container">
                    <div class="struct-item"><span class="struct-label">📍 도입: 하드 스킬(Hard Skills)의 정의</span><div class="struct-text">하드 스킬은 업무 수행에 필요한 구체적이고 전문적인 기술(‘무엇’을 하는가)을 뜻합니다. 이는 직무 기술서에 명시되어 있으며 대학 학위나 전문 교육을 통해 습득됩니다. (예: 회계사, 변호사, 의사의 전공 학위)</div></div>
                    <div class="struct-item"><span class="struct-label">📍 본론: 소프트 스킬(Soft Skills)의 필요성</span><div class="struct-text">그렇다면 전문직에게 하드 스킬만 필요할까요? 아닙니다. 일이 ‘어떻게’ 처리되는지와 관련된 소프트 스킬(대인 관계, 소통 등) 역시 똑같이 중요합니다. 현대의 대인 서비스 중심 경제체제에서 성공하기 위한 필수 요소이기 때문입니다.</div></div>
                    <div class="struct-item"><span class="struct-label">📍 결론: 현대 기업이 원하는 인재상</span><div class="struct-text">따라서 오늘날의 기업들은 노동 시장에 첫발을 내딛는 사회 초년생 및 졸업생들에게 하드 스킬과 소프트 스킬이 훌륭하게 균형을 이룬 조화로운 능력을 요구하고 찾고 있습니다.</div></div>
                </div>
                <div class="topic-area"><span class="topic-title">📌 Topic (주제)</span><span class="topic-kor">현대 직장에서 하드 스킬(전문 지식)과 소프트 스킬(대인 역량)의 균형 잡힌 조화의 중요성</span><span class="topic-eng">The importance of a well-balanced mix of hard and soft skills for professional success in the modern workforce.</span></div>
                <button class="btn-start-next" onclick="startStep(2)">STEP 2: 문장 학습 시작 ▶</button><button class="btn-start-next" style="background:#FFF59D; color:#5D4037; border:2px solid #FBC02D;" onclick="startStep(3)">STEP 3: 영작 연습 시작 ▶</button>`;
        } else {
            const stepNum = currentMode === 'STEP2' ? 2 : 3; header.innerText = `STEP ${stepNum}. (${currentIdx + 1}/${fullData.length})`; nav.classList.remove('hidden');
            document.getElementById('main-next-btn').innerText = (currentIdx === fullData.length - 1) ? "FINISH" : "NEXT";
            const item = fullData[currentIdx];
            if (currentMode === 'STEP2') {
                area.innerHTML = `<div class="sentence-box" onclick="playTTS('${item.en.replace(/'/g, "\\'")}')">${item.en}</div><div class="voca-grid" id="voca-area"></div><button class="btn-check" onclick="toggleView('trans-area')">해석 확인하기</button><div id="trans-area" class="trans-content">${item.ko}</div>`; fillVoca(item.voca);
            } else {
                area.innerHTML = `<div class="kor-box">${item.ko}</div><div class="blank-area" id="blank-area"></div><div class="voca-grid" id="voca-area"></div><button class="btn-check" onclick="toggleView('trans-area')">정답 확인하기</button><div id="trans-area" class="trans-content">${item.en}</div>`; fillBlanks(item.en); fillVoca(item.voca);
            }
        }
    }

    function handleNext() { if (currentIdx < fullData.length - 1) { currentIdx++; render(); } else { window.location.href = '../../index.html'; } }
    function handlePrev() { if (currentIdx > 0) { currentIdx--; render(); } else { window.location.href = '../../index.html'; } }

    function fillVoca(v) { const c = document.getElementById('voca-area'); for(let i=0; i<10; i++){ const d = document.createElement('div'); d.className = 'voca-item'; if(v[i] && v[i] !== '🍎'){ const [e,k]=v[i].split(':'); d.innerText=e; d.onclick=function(){this.classList.toggle('revealed');this.innerText=this.classList.contains('revealed')?k:e;}; }else{ d.innerText='🍎'; d.style.color="#FF3B30"; d.style.cursor="default"; } c.appendChild(d); } }
    
    function fillBlanks(s) {
        const c = document.getElementById('blank-area');
        const prepositions = ["in", "on", "at", "by", "for", "from", "of", "with", "to", "into", "onto", "upon", "about", "above", "across", "after", "against", "along", "among", "around", "as", "before", "behind", "below", "beneath", "beside", "between", "beyond", "during", "except", "inside", "near", "off", "outside", "over", "past", "since", "through", "throughout", "under", "underneath", "until", "up", "within", "without"];
        s.split(' ').forEach(w => {
            const sp = document.createElement('span');
            sp.className = 'word-blank'; sp.innerText = w;
            const pureWord = w.toLowerCase().replace(/[.,'":;?!()“”]/g, "");
            if (prepositions.includes(pureWord)) { sp.classList.add('revealed'); sp.style.borderBottomColor = 'transparent'; }
            sp.onclick = function() { this.classList.add('revealed'); this.style.borderBottomColor = 'transparent'; playTTS(w.replace(/[.,'"]/g, "")); };
            c.appendChild(sp);
        });
    }
    
    function startStep(s) { currentMode = 'STEP' + s; currentIdx = 0; render(); }
    function playTTS(t) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.9; synth.speak(u); }
    function toggleView(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    window.onload = render;
</script>
</body>
</html>
